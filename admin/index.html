<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0E1530"/>
<meta name="robots" content="noindex"/>
<title>Admin Dashboard — Cash Clinic</title>
<link href="../assets/img/cashclinic-logo.jpg" rel="icon" type="image/jpeg"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="../assets/css/style.css?v=12" rel="stylesheet"/>
<link href="../assets/css/admin.css?v=12" rel="stylesheet"/>
</head>
<body>

<div class="admin-shell">

  <header class="admin-header">
    <div class="container">
      <a class="admin-brand" href="index.html">
        <img src="../assets/img/cashclinic-logo.jpg" alt="Cash Clinic"/>
        <span>Cash Clinic</span>
        <span class="admin-tag">Admin</span>
      </a>
      <div class="admin-user">
        <span class="who">Signed in as <strong id="userName">…</strong> <span id="userRole" style="opacity:.7"></span></span>
        <button class="admin-logout" id="logoutBtn">Log out</button>
      </div>
    </div>
  </header>

  <main class="admin-content">
    <div class="container">

      <div class="admin-nav">
        <a href="index.html" class="active">Bookings</a>
        <a href="schedule.html">Schedule</a>
      </div>

      <h1 class="admin-page-title">Dashboard</h1>
      <p class="admin-page-lede" id="pageLede">Loading…</p>

      <!-- Stats -->
      <div class="stat-cards" id="statCards">
        <div class="stat-card"><div class="label">Today</div><div class="value" id="statToday">—</div><div class="delta">bookings</div></div>
        <div class="stat-card"><div class="label">This Week</div><div class="value" id="statWeek">—</div><div class="delta">bookings</div></div>
        <div class="stat-card"><div class="label">This Month</div><div class="value" id="statMonth">—</div><div class="delta">bookings</div></div>
        <div class="stat-card"><div class="label">Revenue (Month)</div><div class="value" id="statRevenue">—</div><div class="delta">KWD paid</div></div>
      </div>

      <!-- Bookings -->
      <section class="bookings-section">
        <h2>
          <span id="bookingsTitle">All bookings</span>
          <div class="section-actions">
            <button class="btn-mini active" data-filter="upcoming">Upcoming</button>
            <button class="btn-mini" data-filter="today">Today</button>
            <button class="btn-mini" data-filter="all">All</button>
          </div>
        </h2>

        <table class="bookings-table" id="bookingsTable">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Package</th>
              <th>Consultant</th>
              <th>Date / Time</th>
              <th>Format</th>
              <th>Price</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <tr><td colspan="7" class="empty-row">Loading bookings…</td></tr>
          </tbody>
        </table>
      </section>

    </div>
  </main>
</div>

<!-- ─── Manage Booking Modal ─── -->
<div class="modal-overlay" id="manageModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Manage Booking</h3>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body">
      <div id="mDetails"></div>

      <div class="modal-form">
        <div class="field">
          <label for="mStatus">Status</label>
          <select id="mStatus">
            <option value="pending">Pending</option>
            <option value="confirmed">Confirmed</option>
            <option value="cancelled">Cancelled</option>
            <option value="completed">Completed</option>
            <option value="no-show">No-show</option>
          </select>
        </div>
        <div class="field">
          <label for="mDuration">Duration (minutes)</label>
          <input type="number" id="mDuration" min="15" max="480" step="15"/>
        </div>
        <div class="field">
          <label for="mAdminNotes">Internal notes (optional, not shown to customer)</label>
          <textarea id="mAdminNotes" rows="2" placeholder="Any notes for your records…"></textarea>
        </div>
        <div class="modal-error" id="mError"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-outline" id="mCloseBtn">Close</button>
      <button class="btn-danger" id="mDeleteBtn" style="display:none">Delete</button>
      <button class="btn-save" id="mSaveBtn">Save changes</button>
    </div>
  </div>
</div>

<script type="module">
import {
  auth, db, requireAuth, signOut,
  collection, query, where, orderBy, getDocs, onSnapshot,
  doc, updateDoc, deleteDoc
} from '../assets/js/firebase-config.js?v=12';

let currentUser = null;
let currentFilter = 'upcoming';
let allBookings = [];

(async () => {
  currentUser = await requireAuth('login.html');
  if (!currentUser) return;

  // Header
  document.getElementById('userName').textContent = currentUser.email || currentUser.user.email;
  document.getElementById('userRole').textContent = '· ' + (currentUser.role === 'admin' ? 'Admin' : 'Consultant');

  // Title depends on role
  if (currentUser.role === 'admin') {
    document.getElementById('pageLede').textContent = 'You see all bookings across the four clinics.';
    document.getElementById('bookingsTitle').textContent = 'All bookings';
  } else {
    document.getElementById('pageLede').textContent = 'You see only your own bookings.';
    document.getElementById('bookingsTitle').textContent = 'My bookings';
  }

  subscribeBookings();
})();

// Subscribe to bookings in real time
function subscribeBookings() {
  const col = collection(db, 'bookings');
  // Admin sees all; consultant sees only own
  const q = currentUser.role === 'admin'
    ? query(col, orderBy('date', 'desc'))
    : query(col, where('consultantId', '==', currentUser.consultantId), orderBy('date', 'desc'));

  onSnapshot(q,
    (snapshot) => {
      allBookings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderStats();
      renderBookings();
    },
    (err) => {
      console.error('Bookings subscription error:', err);
      document.getElementById('bookingsBody').innerHTML =
        '<tr><td colspan="7" class="empty-row"><div class="icon">⚠️</div>Could not load bookings.<br><small style="color:#991B1B">' + (err.message || err) + '</small></td></tr>';
    }
  );
}

// ────── Stats ──────
function renderStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);
  const weekEnd = new Date(today); weekEnd.setDate(weekEnd.getDate() + 7);
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const nextMonth = new Date(today.getFullYear(), today.getMonth()+1, 1);

  let todayCount = 0, weekCount = 0, monthCount = 0, monthRevenue = 0;
  for (const b of allBookings) {
    if (!b.date) continue;
    const d = new Date(b.date + 'T00:00:00');
    if (b.date === todayStr) todayCount++;
    if (d >= today && d < weekEnd) weekCount++;
    if (d >= monthStart && d < nextMonth) {
      monthCount++;
      if (b.paymentStatus === 'paid') monthRevenue += (b.price || 0);
    }
  }
  document.getElementById('statToday').textContent = todayCount;
  document.getElementById('statWeek').textContent = weekCount;
  document.getElementById('statMonth').textContent = monthCount;
  document.getElementById('statRevenue').textContent = monthRevenue;
}

// ────── Bookings list ──────
document.querySelectorAll('[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderBookings();
  });
});

function renderBookings() {
  const body = document.getElementById('bookingsBody');
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr = today.toISOString().slice(0,10);

  let list = [...allBookings];
  if (currentFilter === 'upcoming') {
    list = list.filter(b => b.date && b.date >= todayStr);
    list.sort((a, b) => a.date.localeCompare(b.date) || (a.time || '').localeCompare(b.time || ''));
  } else if (currentFilter === 'today') {
    list = list.filter(b => b.date === todayStr);
    list.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
  } else {
    list.sort((a, b) => b.date.localeCompare(a.date));
  }

  if (list.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="empty-row"><div class="icon">📭</div>No bookings yet.</td></tr>';
    return;
  }

  body.innerHTML = list.map(b => `
    <tr data-id="${b.id}">
      <td data-label="Customer">
        <div class="customer-name">${esc(b.customerName || '—')}</div>
        <div class="customer-sub">${esc(b.customerPhone || '')} · ${esc(b.customerEmail || '')}</div>
      </td>
      <td data-label="Package">
        <div>${esc(b.packageName || b.packageId || '—')}</div>
        <div class="customer-sub">${esc(b.clinic ? 'Cash ' + b.clinic.charAt(0).toUpperCase() + b.clinic.slice(1) : '')}</div>
      </td>
      <td data-label="Consultant">${esc(b.consultantName || b.consultantId || '—')}</td>
      <td data-label="Date / Time">
        <div><strong>${formatDate(b.date)}</strong></div>
        <div class="customer-sub">${esc(b.time || '')}${b.duration ? ' · ' + b.duration + ' min' : ''}</div>
      </td>
      <td data-label="Format">${b.format === 'online' ? '💻 Online' : '🏢 In-person'}</td>
      <td data-label="Price">${b.price || 0} KWD</td>
      <td data-label="Status">
        <span class="status-pill status-${esc(b.status || 'pending')}">${esc(b.status || 'pending')}</span>
      </td>
    </tr>
  `).join('');

  // Wire row clicks → open manage modal
  body.querySelectorAll('tr[data-id]').forEach(row => {
    row.addEventListener('click', () => openManageModal(row.dataset.id));
  });
}

function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}
function esc(s) {
  return String(s ?? '').replace(/[<>&"]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
}

// ────── Manage booking modal ──────
let currentBookingId = null;
const modal = document.getElementById('manageModal');
const mDetails = document.getElementById('mDetails');
const mStatus = document.getElementById('mStatus');
const mDuration = document.getElementById('mDuration');
const mAdminNotes = document.getElementById('mAdminNotes');
const mError = document.getElementById('mError');
const mSave = document.getElementById('mSaveBtn');
const mDelete = document.getElementById('mDeleteBtn');

function openManageModal(bookingId) {
  const b = allBookings.find(x => x.id === bookingId);
  if (!b) return;
  currentBookingId = bookingId;
  mError.style.display = 'none';

  // Show booking details (read-only)
  mDetails.innerHTML = `
    <div class="detail-row"><span class="k">Customer</span><span class="v">${esc(b.customerName)}</span></div>
    <div class="detail-row"><span class="k">Contact</span><span class="v">${esc(b.customerPhone)} · ${esc(b.customerEmail)}</span></div>
    <div class="detail-row"><span class="k">Package</span><span class="v">${esc(b.packageName || b.packageId)}</span></div>
    <div class="detail-row"><span class="k">Consultant</span><span class="v">${esc(b.consultantName)}</span></div>
    <div class="detail-row"><span class="k">Date · Time</span><span class="v">${formatDate(b.date)} · ${esc(b.time || '')}</span></div>
    <div class="detail-row"><span class="k">Format</span><span class="v">${b.format === 'online' ? '💻 Online' : '🏢 In-person'}</span></div>
    <div class="detail-row"><span class="k">Price</span><span class="v">${b.price || 0} KWD</span></div>
    ${b.customerNotes ? `<div class="detail-row"><span class="k">Customer notes</span><span class="v">${esc(b.customerNotes)}</span></div>` : ''}
  `;

  mStatus.value = b.status || 'pending';
  mDuration.value = b.duration || 60;
  mAdminNotes.value = b.adminNotes || '';

  // Only admin can delete
  mDelete.style.display = currentUser.role === 'admin' ? '' : 'none';

  modal.classList.add('show');
}

function closeModal() {
  modal.classList.remove('show');
  currentBookingId = null;
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('mCloseBtn').addEventListener('click', closeModal);
modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

mSave.addEventListener('click', async () => {
  if (!currentBookingId) return;
  mError.style.display = 'none';
  mSave.disabled = true;
  mSave.textContent = 'Saving…';
  try {
    const updates = {
      status: mStatus.value,
      duration: parseInt(mDuration.value) || 60,
      adminNotes: mAdminNotes.value.trim(),
    };
    await updateDoc(doc(db, 'bookings', currentBookingId), updates);
    closeModal();
  } catch (err) {
    console.error(err);
    mError.textContent = '⚠️ ' + (err.message || err);
    mError.style.display = '';
  } finally {
    mSave.disabled = false;
    mSave.textContent = 'Save changes';
  }
});

mDelete.addEventListener('click', async () => {
  if (!currentBookingId) return;
  if (!confirm('Permanently delete this booking? This cannot be undone.')) return;
  mError.style.display = 'none';
  mDelete.disabled = true;
  try {
    await deleteDoc(doc(db, 'bookings', currentBookingId));
    closeModal();
  } catch (err) {
    mError.textContent = '⚠️ ' + (err.message || err);
    mError.style.display = '';
  } finally {
    mDelete.disabled = false;
  }
});

// Logout
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await signOut(auth);
  location.href = 'login.html';
});
</script>

</body>
</html>

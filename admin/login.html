<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0E1530"/>
<meta name="robots" content="noindex"/>
<title>Admin Login — Cash Clinic</title>
<link href="../assets/img/cashclinic-logo.jpg" rel="icon" type="image/jpeg"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&amp;family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="../assets/css/style.css?v=10" rel="stylesheet"/>
<link href="../assets/css/admin.css?v=10" rel="stylesheet"/>
</head>
<body>

<div class="admin-login-wrap">
  <div class="admin-login-card">
    <a class="brand" href="../index.html">
      <img class="brand-mark" src="../assets/img/cashclinic-logo.jpg" alt="Cash Clinic"/>
      <span style="font-weight:800;color:var(--ink);font-size:18px">
        <span style="color:var(--blue)">Cash</span><span style="color:var(--orange)">Clinic.</span>
      </span>
    </a>

    <h1>Admin Login</h1>
    <p class="lede">Sign in to view bookings and manage your schedule.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" autocomplete="email" required/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
      <div id="loginError" class="admin-error" style="display:none"></div>
    </form>

    <p style="text-align:center;font-size:12px;color:var(--ink-2);margin-top:24px">
      <a href="../index.html" style="color:var(--blue);font-weight:600">← Back to site</a>
    </p>
  </div>
</div>

<script type="module">
import { auth, signInWithEmailAndPassword, waitForAuth, getUserData } from '../assets/js/firebase-config.js?v=10';

const form = document.getElementById('loginForm');
const submitBtn = document.getElementById('submitBtn');
const errorBox = document.getElementById('loginError');

// If already signed in, skip to dashboard
(async () => {
  const user = await waitForAuth();
  if (user) {
    const data = await getUserData(user.uid);
    if (data) location.href = 'index.html';
  }
  // Show error from URL param (e.g., redirect after unauthorized)
  const params = new URLSearchParams(location.search);
  if (params.get('error') === 'unauthorized') {
    showError('Your account is not authorized. Contact the admin.');
  }
})();

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = '';
}
function clearError() {
  errorBox.style.display = 'none';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();
  submitBtn.disabled = true;
  submitBtn.textContent = 'Signing in…';
  try {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const cred = await signInWithEmailAndPassword(auth, email, password);
    const data = await getUserData(cred.user.uid);
    if (!data) {
      showError('Your account is not authorized. Contact the admin.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
      return;
    }
    location.href = 'index.html';
  } catch (err) {
    console.error(err);
    const code = err.code || '';
    let msg = 'Sign-in failed. Please try again.';
    if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
      msg = 'Wrong email or password.';
    } else if (code === 'auth/too-many-requests') {
      msg = 'Too many attempts. Try again in a few minutes.';
    } else if (code === 'auth/network-request-failed') {
      msg = 'Network error. Check your internet.';
    }
    showError(msg);
    submitBtn.disabled = false;
    submitBtn.textContent = 'Sign in';
  }
});
</script>

</body>
</html>
